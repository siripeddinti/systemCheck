<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Check</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: min(680px, 92vw);
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 700;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.45;
      color: #555;
    }
    .bar {
      width: 100%;
      height: 16px;
      background: #e8e8e8;
      border-radius: 999px;
      overflow: hidden;
      margin: 18px 0 10px;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7aa7ff, #4b7bec);
      transition: width 0.25s linear;
    }
    .status {
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    .btn {
      margin-top: 16px;
      border: 0;
      background: #222;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    .btn:hover { opacity: 0.92; }
    .jump {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .jump img {
      width: 90vw;
      height: 90vh;
      object-fit: contain;
      filter: contrast(1.7) brightness(0.48) saturate(0.65);
      transform: scale(1.02);
    }
    .flash {
      animation: flicker 0.08s steps(2) 10;
    }
    @keyframes flicker {
      0% { background: black; }
      50% { background: #150000; }
      100% { background: black; }
    }
    .small {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Browser Performance Check</h1>
    <p>Running a lightweight rendering and cache diagnostic. Please keep this tab open while the scan completes.</p>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="status" id="status">Ready to begin.</div>
    <button class="btn" id="startBtn" type="button">Start scan</button>
    <div class="small">For best results, do not switch tabs during analysis.</div>
  </div>

  <div class="jump" id="jump">
    <img id="jumpImg" src="./download.jpeg" alt="system image" />
  </div>

  <script>
    window.onload = function () {
      const steps = [
        'Initializing renderer...',
        'Checking cached assets...',
        'Validating DOM paint timing...',
        'Scanning visual pipeline...',
        'Finalizing report...'
      ];

      const fill = document.getElementById('fill');
      const status = document.getElementById('status');
      const btn = document.getElementById('startBtn');
      const jump = document.getElementById('jump');
      const card = document.getElementById('card');

      function sleep(ms) {
        return new Promise(function(resolve) {
          setTimeout(resolve, ms);
        });
      }

      function playScareSound() {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;

          const ctx = new AudioContextClass();
          const now = ctx.currentTime;

          const master = ctx.createGain();
          const limiter = ctx.createDynamicsCompressor();
          limiter.threshold.value = -8;
          limiter.knee.value = 6;
          limiter.ratio.value = 12;
          limiter.attack.value = 0.003;
          limiter.release.value = 0.2;

          master.gain.value = 0.95;
          master.connect(limiter);
          limiter.connect(ctx.destination);

          const makeNoise = () => {
            const buffer = ctx.createBuffer(1, ctx.sampleRate * 1.2, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
              data[i] = Math.random() * 2 - 1;
            }
            const src = ctx.createBufferSource();
            src.buffer = buffer;
            return src;
          };

          const osc1 = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const osc3 = ctx.createOscillator();
          const noise = makeNoise();

          const gain1 = ctx.createGain();
          const gain2 = ctx.createGain();
          const gain3 = ctx.createGain();
          const noiseGain = ctx.createGain();

          const noiseFilter = ctx.createBiquadFilter();
          noiseFilter.type = 'bandpass';
          noiseFilter.frequency.setValueAtTime(2200, now);
          noiseFilter.Q.value = 1.2;

          const highpass = ctx.createBiquadFilter();
          highpass.type = 'highpass';
          highpass.frequency.value = 120;

          osc1.type = 'sawtooth';
          osc2.type = 'square';
          osc3.type = 'triangle';

          osc1.frequency.setValueAtTime(1900, now);
          osc1.frequency.exponentialRampToValueAtTime(240, now + 0.95);

          osc2.frequency.setValueAtTime(140, now);
          osc2.frequency.exponentialRampToValueAtTime(52, now + 0.95);

          osc3.frequency.setValueAtTime(70, now);
          osc3.frequency.exponentialRampToValueAtTime(30, now + 0.95);

          gain1.gain.setValueAtTime(0.0001, now);
          gain1.gain.exponentialRampToValueAtTime(0.75, now + 0.01);
          gain1.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);

          gain2.gain.setValueAtTime(0.0001, now);
          gain2.gain.exponentialRampToValueAtTime(0.45, now + 0.015);
          gain2.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);

          gain3.gain.setValueAtTime(0.0001, now);
          gain3.gain.exponentialRampToValueAtTime(0.28, now + 0.015);
          gain3.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);

          noiseGain.gain.setValueAtTime(0.0001, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.55, now + 0.008);
          noiseGain.gain.exponentialRampToValueAtTime(0.18, now + 0.18);
          noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.95);

          osc1.connect(gain1).connect(highpass);
          osc2.connect(gain2).connect(highpass);
          osc3.connect(gain3).connect(highpass);
          noise.connect(noiseFilter).connect(noiseGain).connect(highpass);
          highpass.connect(master);

          osc1.start(now);
          osc2.start(now);
          osc3.start(now);
          noise.start(now);

          osc1.stop(now + 1.0);
          osc2.stop(now + 1.0);
          osc3.stop(now + 1.0);
          noise.stop(now + 1.0);
        } catch (e) {
          console.log(e);
        }
      }

      async function runScan() {
        btn.disabled = true;
        btn.textContent = 'Running...';
        fill.style.width = '0%';

        for (let i = 0; i < steps.length; i++) {
          status.textContent = steps[i];
          fill.style.width = ((i + 1) / steps.length) * 100 + '%';
          await sleep(700);
        }

        card.style.display = 'none';
        document.body.style.background = 'black';
        jump.style.display = 'flex';
        jump.classList.add('flash');
        playScareSound();

        await sleep(3000);

        jump.style.display = 'none';
        jump.classList.remove('flash');
        document.body.style.background = '#f4f4f4';
        card.style.display = 'block';
        status.textContent = 'Scan complete.';
        btn.textContent = 'Run again';
        btn.disabled = false;
      }

      btn.onclick = runScan;
    };
  </script>
</body>
</html>
