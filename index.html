<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Check</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: min(680px, 92vw);
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 700;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.45;
      color: #555;
    }
    .bar {
      width: 100%;
      height: 16px;
      background: #e8e8e8;
      border-radius: 999px;
      overflow: hidden;
      margin: 18px 0 10px;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7aa7ff, #4b7bec);
      transition: width 0.25s linear;
    }
    .status {
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    .btn {
      margin-top: 16px;
      border: 0;
      background: #222;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    .btn:hover { opacity: 0.92; }
    .jump {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }
    .jump img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      filter: contrast(1.35) brightness(0.7) saturate(0.7);
    }
    .flash {
      animation: flicker 0.08s steps(2) 10;
    }
    @keyframes flicker {
      0% { background: black; }
      50% { background: #120000; }
      100% { background: black; }
    }
    .small {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Browser Performance Check</h1>
    <p>Running a lightweight rendering and cache diagnostic. Please keep this tab open while the scan completes.</p>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="status" id="status">Ready to begin.</div>
    <button class="btn" id="startBtn">Start scan</button>
    <div class="small">For best results, do not switch tabs during analysis.</div>
  </div>

  <div class="jump" id="jump">
    <img id="jumpImg" src="./download.jpeg" alt="system image" onerror="this.style.display='none'; document.getElementById('jumpFallback').style.display='block';" />
    <div id="jumpFallback" style="display:none; color:white; font-size:18px; font-family:Arial, sans-serif;">Image failed to load. Put <code style='color:#ddd;'>download.jpeg</code> in the same folder as this HTML file.</div>
  </div>

  <script>
    const steps = [
      'Initializing renderer...',
      'Checking cached assets...',
      'Validating DOM paint timing...',
      'Scanning visual pipeline...',
      'Finalizing report...'
    ];

    const fill = document.getElementById('fill');
    const status = document.getElementById('status');
    const btn = document.getElementById('startBtn');
    const jump = document.getElementById('jump');
    const jumpImg = document.getElementById('jumpImg');

    // Best option: keep a local file like download.jpeg beside this HTML file.
    // If you ever get a DIRECT image URL ending in .jpg/.png/.jpeg/.webp, you can put it here.
    const remoteImageUrl = '';
    if (remoteImageUrl) {
      jumpImg.src = remoteImageUrl;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runScan() {
      btn.disabled = true;
      btn.textContent = 'Running...';

      for (let i = 0; i < steps.length; i++) {
        status.textContent = steps[i];
        fill.style.width = `${((i + 1) / steps.length) * 100}%`;

        if (i === 2) {
          try {
            const earlyAudio = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
            earlyAudio.volume = 1.0;
            earlyAudio.play().catch(() => {});
          } catch (e) {}
        }

        await sleep(900);
      }

      document.body.style.background = 'black';
      document.getElementById('card').style.display = 'none';
      jump.style.display = 'flex';
      jump.classList.add('flash');

      await sleep(2000);

      jump.style.display = 'none';
      document.getElementById('card').style.display = 'block';
      document.body.style.background = '#f4f4f4';
      status.textContent = 'Scan complete.';
      btn.textContent = 'Run again';
      btn.disabled = false;
    }

    btn.addEventListener('click', runScan);
  </script>
</body>
</html>
